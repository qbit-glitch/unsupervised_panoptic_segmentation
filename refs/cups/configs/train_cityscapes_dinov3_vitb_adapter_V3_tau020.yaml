# Stage-2: DINOv3 ViT-B/16 Cascade Mask R-CNN on V3 adapter + DepthPro τ=0.20 pseudo-labels.
# Pseudo-labels: V3 adapter k=80 semantics (mIoU=55.29%) + DepthPro depth-guided CC (τ=0.20, A_min=1000)
# Hypothesis: Better stuff semantics lifts PQ_stuff ceiling (stagnates at ~30% with raw k=80).
# Target: remote 2x GTX 1080 Ti (santosh@100.93.203.100)
# Effective batch: 2 GPUs × bs=1 × 8 accum = 16

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_adapter_V3_tau020/"
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 2
  NUM_NODES: 1
  NUM_WORKERS: 2
  LOG_PATH: "/media/santosh/Kuldeep/panoptic_segmentation/experiments"
  RUN_NAME: "cups_dinov3_vitb_adapter_V3_tau020_stage2"
TRAINING:
  STEPS: 8000
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 8
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
