# Stage-3: DINOv2 ResNet-50 Cascade Mask R-CNN self-training on k=80 pseudo-labels.
# Loads best Stage-2 checkpoint (cups_resnet50_k80_16k_bs32_stage2) and refines via EMA.
# Target: remote 2x GTX 1080 Ti (santosh@172.17.254.146)
# Effective batch: 2 GPUs x bs=2 x 8 accum = 32
# LR: 0.0002 (linear-scaled from 0.0001 at eff_bs=16)
# Steps: 3 rounds x 4000 = 12000 total self-training steps
# Precision: 16-mixed (1080 Ti does not support bf16)
#
# IMPORTANT: Update MODEL.CHECKPOINT to the best Stage-2 checkpoint path before launching.

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_k80/"
MODEL:
  BACKBONE_TYPE: "resnet50"
  USE_DINO: True
  # Fill in the best Stage-2 checkpoint path after Stage-2 training completes:
  # ls /media/santosh/Kuldeep/panoptic_segmentation/experiments/cups_resnet50_k80_16k_bs32_stage2/**/*.ckpt
  CHECKPOINT: "__FILL_AFTER_STAGE2__"
  TTA_SCALES:
    - 0.5
    - 0.75
    - 1.0
AUGMENTATION:
  NUM_STEPS_STARTUP: 0
  COPY_PASTE: True
  CONFIDENCE: 0.75
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 2
  NUM_NODES: 1
  NUM_WORKERS: 4
  LOG_PATH: "/media/santosh/Kuldeep/panoptic_segmentation/experiments"
  RUN_NAME: "cups_resnet50_k80_bs32_stage3"
TRAINING:
  BATCH_SIZE: 2
  ACCUMULATE_GRAD_BATCHES: 8
  PRECISION: "16-mixed"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0002
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 200
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 500
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 1.0
SELF_TRAINING:
  ROUND_STEPS: 4000
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
