# TM ablation: 100-step mini-train for verifying stuff-preservation approaches.
# Base: DINOv3 ViT-B/16, k=80, CPU, no wandb.

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes_val"
  IGNORE_UNKNOWN_THING_REGIONS: True
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/Users/qbit-glitch/Desktop/datasets/cityscapes/"
  ROOT_VAL: "/Users/qbit-glitch/Desktop/datasets/cityscapes/"
  ROOT_PSEUDO: "/Users/qbit-glitch/Desktop/datasets/cityscapes/cups_pseudo_labels_k80/"
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 1.0
AUGMENTATION:
  NUM_STEPS_STARTUP: 0
  COPY_PASTE: False
  RESOLUTIONS:
    - [384, 768]
SYSTEM:
  ACCELERATOR: "cpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 0
  LOG_PATH: "results/tm_ablation"
TRAINING:
  STEPS: 100
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 1
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 50
  LOG_EVERT_N_STEPS: 10
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 50
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 0
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
