# Stage-2 P1 -- LoCE (Lovász-Softmax + boundary-weighted CE).
#
# Derived from the P0 baseline by enabling the P1 aux losses. All other
# knobs are identical so the gate comparison is apples-to-apples. Weights
# follow the plan: LOVASZ=0.5 (matched to CE magnitude, tune if instance
# heads drift), BOUNDARY=0.3 with a 3-px dilated band and 2x CE multiplier
# inside the band.

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_depthpro_tau020/"

MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
  SEM_SEG_HEAD:
    # P1 -- enable LoCE.
    LOVASZ_WEIGHT: 0.5
    BOUNDARY_WEIGHT: 0.3
    BOUNDARY_DILATE_PX: 3
    BOUNDARY_CE_MULT: 2.0
    # P2-P4 still off.
    STEGO_WEIGHT: 0.0
    STEGO_TEMPERATURE: 0.1
    STEGO_KNN_K: 7
    STEGO_FEATURE_SOURCE: "fpn_p2"
    DEPTH_SMOOTH_WEIGHT: 0.0
    DEPTH_SMOOTH_ALPHA: 10.0
    GATED_CRF_WEIGHT: 0.0
    GATED_CRF_KERNEL: 5
    GATED_CRF_RGB_SIGMA: 0.1
    NECO_WEIGHT: 0.0
    NECO_K: 5

AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]

SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 2
  LOG_PATH: "results/stage2_P1_loce"
  RUN_NAME: "stage2_P1_loce_k80_depthpro_tau020"

TRAINING:
  STEPS: 8000
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 16
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1

SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5

VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
