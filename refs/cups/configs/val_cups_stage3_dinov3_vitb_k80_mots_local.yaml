# Cross-dataset evaluation: DINOv3 Stage-3 on MOTSChallenge (OOD).
# Target machine: M4 Pro MacBook 48GB (CPU)
#
# Usage:
#   python refs/cups/evaluate_mots.py \
#       --experiment_config_file refs/cups/configs/val_cups_stage3_dinov3_vitb_k80_mots_local.yaml \
#       --checkpoint checkpoints/dinov3_stage3/dinov3_official_stage3_step8000.ckpt

DATA:
  CROP_RESOLUTION: (512, 1024)
  VAL_SCALE: 1.0
  SCALE: 1.0
  DATASET: "mots"
  NUM_CLASSES: 2
  ROOT: "/Users/qbit-glitch/Desktop/datasets/MOTSChallenge"
  ROOT_VAL: "/Users/qbit-glitch/Desktop/datasets/MOTSChallenge"
  ROOT_PSEUDO: ""
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 0.75
    - 1.0
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: False
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [512, 1024]
SYSTEM:
  ACCELERATOR: "cpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 0
  LOG_PATH: "experiments"
  RUN_NAME: "cups_stage3_dinov3_vitb_k80_mots_val"
TRAINING:
  BATCH_SIZE: 1
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
