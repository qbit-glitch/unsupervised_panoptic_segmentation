# Stage-3 validation: CUPS with DINOv3 ViT-B/16 backbone.
# Use after DINOv3 Stage-2 training completes.
# Target machine: Anydesk RTX A6000 48GB, conda env "ups"
#
# Usage:
#   Set CHECKPOINT below to DINOv3 Stage-3 checkpoint path, then run:
#   python scripts/validate_cups_stage3.py \
#       --config refs/cups/configs/val_cups_stage3_dinov3_vitb_k80_anydesk.yaml

DATA:
  CROP_RESOLUTION: (640, 1280)
  VAL_SCALE: 0.625
  SCALE: 0.625
  DATASET: "cityscapes"
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_dinov3_k80/"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: False
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [640, 1280]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 0
  LOG_PATH: "experiments"
  RUN_NAME: "cups_stage3_dinov3_vitb_k80_val"
TRAINING:
  BATCH_SIZE: 1
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
