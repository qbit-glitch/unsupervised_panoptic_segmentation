# Exp 12: Stage-3 Self-Training with Progressive Rank r=2/4/8
# Increase LoRA rank across self-training rounds:
#   Round 1: r=2, alpha=2.0 (~215K params) — low capacity, high noise tolerance
#   Round 2: r=4, alpha=4.0 (~425K params) — medium capacity, medium noise
#   Round 3: r=8, alpha=8.0 (~845K params) — high capacity, low noise
#
# Math: SNR_LoRA ≈ SNR_full × √(d_in / r). As ε_t decreases across rounds,
# higher r is safe because SNR_effective(r_t, ε_t) stays in stable range.
# At (r=2, ε=0.30): SNR=19.6× → (r=4, ε=0.20): 17.0× → (r=8, ε=0.15): 13.8×

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_dinov3_k80/"
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  CHECKPOINT: null  # SET TO BEST STAGE-2 CHECKPOINT PATH
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
  LORA:
    ENABLED: True
    VARIANT: "conv_dora"
    RANK: 4
    ALPHA: 4.0
    DROPOUT: 0.05
    LATE_BLOCK_START: 6
    LR_A: 0.00001
    LR_B: 0.00005
    MAGNITUDE_WD: 0.001
    DELAYED_START_STEPS: 0
    PROGRESSIVE:
      ENABLED: True
      RANKS: [2, 4, 8]
      ALPHAS: [2.0, 4.0, 8.0]
      COVERAGES: [6, 6, 6]
AUGMENTATION:
  NUM_STEPS_STARTUP: 0
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]
    - [544, 1088]
    - [576, 1152]
    - [608, 1216]
    - [640, 1280]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 4
  LOG_PATH: "/media/santosh/Kuldeep/panoptic_segmentation/experiments"
  RUN_NAME: "cups_dinov3_vitb_k80_self_progressive_rank"
TRAINING:
  STEPS: 1500
  BATCH_SIZE: 2
  ACCUMULATE_GRAD_BATCHES: 4
  PRECISION: "16-mixed"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 500
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
  DISABLE_EMA: False
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
