# Stage-2: Panoptic Cascade Mask R-CNN with DINOv3 ViT-B/16 backbone.
# Target machine: Anydesk RTX A6000 48GB, conda env "ups"
#
# Prerequisites:
#   1. Extract DINOv3 features:
#      python mbps_pytorch/extract_dinov3_features.py \
#          --cityscapes_root /path/to/cityscapes --split train val --device cuda
#   2. Re-run k=80 k-means on DINOv3 features (shape 3200x768 vs DINOv2's 2048x768):
#      python mbps_pytorch/generate_semantic_pseudolabels_dinov3.py \
#          --cityscapes_root /path/to/cityscapes --k 80
#      Output: cups_pseudo_labels_dinov3_k80/{train,val}/
#   3. Then run this training config.

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/home/cvpr_ug_5/umesh/datasets/cityscapes/"
  ROOT_VAL: "/home/cvpr_ug_5/umesh/datasets/cityscapes/"
  ROOT_PSEUDO: "/home/cvpr_ug_5/umesh/datasets/cityscapes/cups_pseudo_labels_depthpro/"
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]
    - [544, 1088]
    - [576, 1152]
    - [608, 1216]
    - [640, 1280]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 4
  LOG_PATH: "/home/cvpr_ug_5/umesh/experiments"
  RUN_NAME: "cups_dinov3_vitb_k80_anydesk"
TRAINING:
  STEPS: 8000
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 8
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
