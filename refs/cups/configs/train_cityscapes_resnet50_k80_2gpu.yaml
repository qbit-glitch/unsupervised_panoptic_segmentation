# Stage-2: DINO ResNet-50 Cascade Mask R-CNN on k=80 pseudo-labels.
# Target: remote 2x GTX 1080 Ti (santosh@172.17.254.146)
# Same pseudo-labels as DINOv3 runs (cups_pseudo_labels_k80).
# Effective batch: 2 GPUs × bs=2 × 4 accum = 16
# Fair comparison: same labels, same effective batch, same steps as DINOv3.

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  THING_STUFF_THRESHOLD: 0.05
  ROOT: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_VAL: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/"
  ROOT_PSEUDO: "/media/santosh/Kuldeep/panoptic_segmentation/datasets/cityscapes/cups_pseudo_labels_k80/"
MODEL:
  BACKBONE_TYPE: "resnet50"
  USE_DINO: True
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 2
  NUM_NODES: 1
  NUM_WORKERS: 4
  LOG_PATH: "/media/santosh/Kuldeep/panoptic_segmentation/experiments"
  RUN_NAME: "cups_resnet50_k80_stage2"
TRAINING:
  STEPS: 8000
  BATCH_SIZE: 2
  ACCUMULATE_GRAD_BATCHES: 4
  PRECISION: "16-mixed"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 1.0
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
