# Semantic Adapter Baseline Configuration
# DINOv2 ViT-B/14 + CAUSE-TR with DoRA adapters

experiment_name: "semantic_adapter_dora_baseline"
output_dir: "checkpoints/semantic_adapter_dora_baseline"

# Model configuration
model:
  backbone: "dinov2_vit_base_14"
  cause_checkpoint_dir: "refs/cause"
  variant: "dora"           # lora, dora, conv_dora
  rank: 4
  alpha: 4.0
  dropout: 0.05
  late_block_start: 6       # Early blocks: qkv-only, Late blocks: full
  adapt_cause: true         # Also adapt CAUSE-TR head

# Data configuration
data:
  data_dir: "datasets"
  cityscapes_root: "datasets/cityscapes"
  depth_subdir: "depth_depthpro"
  batch_size: 32
  num_workers: 4

# Training configuration
training:
  epochs: 50
  lr: 1.0e-4
  save_every: 5
  seed: 42

# Loss configuration
losses:
  names: ["distillation", "depth_cluster"]
  weights:
    distillation: 1.0
    depth_cluster: 0.05
  lambda_depth: 0.05
  depth_shift: 0.0

# Device
device: "auto"   # auto, cuda, mps, cpu
