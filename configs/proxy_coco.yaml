# Proxy COCO-Stuff-27 config for smoke testing
# Small subset, reduced resolution, fewer epochs
_base_: "default.yaml"

architecture:
  num_classes: 27

data:
  dataset: "coco_stuff27"
  data_dir: "data/coco_proxy"
  depth_dir: "data/coco_proxy/depth_zoedepth"
  num_classes: 27
  num_stuff_classes: 15
  num_thing_classes: 12
  image_size: [256, 256]
  crop_size: [256, 256]

training:
  total_epochs: 6
  phase_a_end: 2
  phase_b_end: 4
  self_training_rounds: 1
  self_training_epochs_per_round: 1
  batch_size: 2
  learning_rate: 4.0e-4

checkpointing:
  save_every_n_epochs: 2
  checkpoint_dir: "checkpoints/proxy_coco/"

logging:
  log_every_n_steps: 5
  eval_every_n_epochs: 2
  use_wandb: false
