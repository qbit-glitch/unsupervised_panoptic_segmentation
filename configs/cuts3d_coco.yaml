# CutS3D Paper Reproduction Config — COCO train2017
# Follows exact hyperparameters from Sick et al., "CutS3D", ICCV 2025.
#
# Usage:
#   python scripts/train_cuts3d.py --config configs/cuts3d_coco.yaml \
#       --phase full --epochs 30 --self-train-rounds 3
#
# Paper trains on ImageNet-1K (1.3M), evaluates zero-shot on COCO val2017.
# We train on COCO train2017 (~118K) since it's available on GCS.

_base_: "default.yaml"

architecture:
  backbone: "dino_vits8"
  backbone_dim: 384
  max_instances: 3           # Paper uses max 3 masks per image (Table 8)
  num_classes: 1             # Class-agnostic (CAD)

  # Cascade Mask R-CNN (CAD) config
  cad:
    hidden_dim: 256
    num_refinement_stages: 3
    num_classes: 1           # Class-agnostic (fg/bg)

# CutS3D-specific hyperparameters (from paper Section 3 & Table 8)
cuts3d:
  # NCut affinity threshold (Table 8a: τ_knn=0.115 is optimal)
  tau_knn: 0.115

  # Spatial Importance Sharpening (Section 3.1, Eq. 1-3)
  beta: 0.45                 # Min value for ΔD normalization (Eq. 2)
  sigma_gauss: 3.0           # Gaussian filter σ for depth sharpening

  # Spatial Confidence (Section 3.2, Eq. 4)
  sc_num_samples: 6          # T=6 cuts at varying τ (Algorithm 6)
  sc_knn_min: 0.5            # Minimum k for SC sampling

  # LocalCut (Section 3.1)
  localcut_k: 15             # k-NN graph neighbors
  localcut_threshold: 0.5    # Edge weight threshold for MinCut

  # Confident Copy-Paste (Section 3.3)
  copy_paste_top_fraction: 0.5

  # Image processing
  image_size: 480            # Paper uses 480×480

training:
  # Training schedule for CAD
  total_epochs: 30
  learning_rate: 2.0e-4      # AdamW LR
  min_learning_rate: 1.0e-6
  lr_schedule: "cosine"
  warmup_steps: 500
  max_steps: 50000           # ~118K/32 * 30 epochs ≈ 110K steps
  weight_decay: 0.01
  gradient_clip: 1.0
  batch_size: 8              # Per TPU core (×4 cores = 32 total)
  optimizer: "adamw"

  # Self-training (Section 3.4)
  self_training_rounds: 3
  self_training_epochs_per_round: 10

loss_weights:
  # SC Soft Target Loss (Eq. 6)
  lambda_drop: 0.5           # DropLoss weight (paper default)
  lambda_box: 1.0            # Box regression weight

data:
  dataset: "coco_stuff27"
  data_dir: "gs://mbps-panoptic/datasets/coco"
  depth_dir: "gs://mbps-panoptic/datasets/coco/depth_zoedepth"
  tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/train"
  val_tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/val"
  image_size: [480, 480]     # Paper: 480×480
  stored_size: [512, 512]    # Size stored in TFRecords
  batch_size: 8              # Per TPU core
  num_workers: 8
  prefetch_buffer: 16

gcs:
  bucket: "mbps-panoptic"
  tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/train"
  checkpoint_dir: "gs://mbps-panoptic/checkpoints/cuts3d"
  results_dir: "gs://mbps-panoptic/results/cuts3d"
  weights_dir: "gs://mbps-panoptic/weights"

checkpointing:
  save_every_n_epochs: 5
  keep_top_k: 3
  checkpoint_dir: "checkpoints/cuts3d/"

logging:
  log_every_n_steps: 50
  eval_every_n_epochs: 5
  use_wandb: true
  wandb_project: "mbps"
  wandb_group: "cuts3d_coco"
  wandb_tags: ["cuts3d", "coco", "paper_reproduction"]

evaluation:
  # COCO evaluation
  eval_dataset: "coco_val2017"
  val_tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/val"
  # AP metrics (paper reports AP^mask)
  iou_thresholds: [0.5, 0.75]
