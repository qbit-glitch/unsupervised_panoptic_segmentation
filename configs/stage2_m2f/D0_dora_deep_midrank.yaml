# D0: Conv-DoRA "Deep-HighRank" — r=32, alpha=32, block≥3.
# Both D0 and D1 use r=32; the only variable is block coverage.
# D0 tests whether adapting from block 3 (preserving early low-level features)
# is sufficient; D1 tests whether full-depth adaptation (block 0) adds value.
#
# Inherits: M0_baseline_dinov3_vitb_k80.yaml (frozen backbone M2F).
# Overrides: pseudo-labels → dcfa_simcf_abc, enables Conv-DoRA.
# Expected trainable: ~4.8M adapter params + ~16M head/FPN = ~21M total.

_BASE_: "M0_baseline_dinov3_vitb_k80.yaml"

DATA:
  ROOT_PSEUDO: "/Users/qbit-glitch/Desktop/datasets/cityscapes/cups_pseudo_labels_dcfa_simcf_abc/"

MODEL:
  LORA:
    ENABLED: True
    VARIANT: "conv_dora"
    RANK: 32
    ALPHA: 32.0
    DROPOUT: 0.05
    LATE_BLOCK_START: 3
    LR_A: 0.00001
    LR_B: 0.00005
    MAGNITUDE_WD: 0.001
    DELAYED_START_STEPS: 0

SYSTEM:
  LOG_PATH: "results/stage2_m2f/D0_dora_deep_midrank"
  RUN_NAME: "D0_dora_deep_rank32_dcfa"
