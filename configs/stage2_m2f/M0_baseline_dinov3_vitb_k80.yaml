# M0 baseline: Mask2Former + ViT-Adapter, frozen DINOv3 ViT-B/16,
# k=80 semantic + DepthPro tau=0.20 instance pseudo-labels.
# Zero augmentations, 20k steps, class-weighted CE.

_BASE_: "../../refs/cups/configs/train_cityscapes_dinov3_vitb_k80_depthpro_tau020.yaml"

MODEL:
  META_ARCH: "Mask2FormerPanoptic"
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25
  MASK2FORMER:
    NUM_QUERIES: 100
    QUERY_POOL: "standard"
    NUM_DECODER_LAYERS: 6
    PIXEL_DECODER_LAYERS: 6
    HIDDEN_DIM: 256
    NUM_HEADS: 8
    MASK_WEIGHT: 5.0
    DICE_WEIGHT: 5.0
    CLASS_WEIGHT: 2.0
    NO_OBJECT_WEIGHT: 0.1
    NUM_POINTS: 12544
    # Eval-time filters. Defaults 0.4/0.8 are Mask2Former paper values tuned
    # for post-converged supervised training. In our unsupervised cold-start
    # regime (random-init queries + frozen DINOv3 + k=80 noisy pseudo-labels)
    # those strict cutoffs throw away virtually every query and PQ reads 0
    # even while the network is learning (see commit 48bc1ce).
    #
    # The intermediate 0.05/0.3 still caused PQ_things=0 exactly while
    # PQ_stuffs rose to ~7%: `_panoptic_merge` does
    #   cur_prob_masks = cur_scores.view(-1,1,1) * cur_masks
    #   cur_mask_ids = cur_prob_masks.argmax(0)
    # Stuff queries converge first (larger masks, more samples per class) so
    # their softmax-max scores are ~0.7 by step 3k; rare thing classes are
    # still ~0.3. Whenever a stuff query's mask prob at a thing pixel is
    # above 0.43*thing_prob, the stuff query wins the pixel-level argmax
    # (0.7*0.43 > 0.3*1.0). Thing queries end up with mask_area << original
    # _area, fail the `mask_area/original_area > overlap_threshold` gate,
    # and the pipeline reports zero thing segments for every batch (visible
    # in the per-step "boxes doesn't contain any box" warning from
    # prediction_to_label_format -> get_bounding_boxes).
    #
    # Matching the unit test values (both 0.0) lets under-confident thing
    # queries survive until their scores catch up with stuff. The empty-
    # segments_info path is already covered by
    # tests/stage2_m2f/test_panoptic_merge_schema.py. Raise again (0.1/0.3,
    # then toward paper defaults) once PQ_things climbs.
    OBJECT_MASK_THRESHOLD: 0.0
    OVERLAP_THRESHOLD: 0.0
    PYRAMID_CHANNELS: 256
    ADAPTER_BLOCKS: 4
    ADAPTER_EMBED_DIM: 768
    DROPPATH: 0.0
  # Aux semantic-head losses OFF at M0 (we switch meta-arch entirely).
  SEM_SEG_HEAD:
    LOVASZ_WEIGHT: 0.0
    BOUNDARY_WEIGHT: 0.0
    STEGO_WEIGHT: 0.0
    DEPTH_SMOOTH_WEIGHT: 0.0
    GATED_CRF_WEIGHT: 0.0
    NECO_WEIGHT: 0.0

TRAINING:
  STEPS: 20000
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 16
  PRECISION: "bf16-mixed"
  CLASS_WEIGHTING: True
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  # Linear LR warm-up (start_factor=1e-3 -> 1.0 over WARMUP_STEPS steps).
  # 100 random-init queries + frozen backbone otherwise produce destabilising
  # gradient spikes in the first few hundred steps and the loss plateaus
  # around 70 instead of decaying. M2F paper uses ~1500-step warm-up.
  WARMUP_STEPS: 1500
  VAL_EVERY_N_STEPS: 1000
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: False          # Mask2Former has its own matching loss
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1

AUGMENTATION:
  COPY_PASTE: False          # OFF at M0, baseline only
  NUM_STEPS_STARTUP: 500
  # Reduce random crop aggressiveness so sparse Cityscapes things (cars,
  # pedestrians, riders) are not cropped out during cold-start training.
  # Default (0.7, 1.0) causes ~30% empty-thing crops (Hypothesis D).
  RANDOM_CROP_SCALE: (0.9, 1.0)
  LSJ:
    ENABLED: False
  COLOR_JITTER:
    ENABLED: False

SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_NODES: 1
  NUM_WORKERS: 2
  LOG_PATH: "results/stage2_m2f/M0_baseline"
  RUN_NAME: "M0_baseline_dinov3_vitb_k80"

VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
  USE_DENSE_CRF: False
