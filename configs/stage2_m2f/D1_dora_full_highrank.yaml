#
# Trade-off: ~4.8M adapter params (vs ~2.0M in D0) â†’ higher risk of
# overfitting to pseudo-label noise. Lower LR (2.5x reduced) compensates.
#
# Inherits: M0_baseline_dinov3_vitb_k80.yaml.
# Overrides: pseudo-labels â†’ dcfa_simcf_abc, enables Conv-DoRA aggressively.
# Expected trainable: ~4.8M adapter params + ~16M head/FPN = ~21M total.

_BASE_: "M0_baseline_dinov3_vitb_k80.yaml"

