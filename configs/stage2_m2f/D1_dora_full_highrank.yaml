# D1: Conv-DoRA "Full-HighRank" â€” r=32, alpha=32, blockâ‰¥0.
# Hypothesis: if D0 (r=16, blockâ‰¥3) closes the gap but doesn't fully reach
#             the frozen-backbone PQ 35.83, then the bottleneck is either
#             (a) insufficient rank for fine-grained boundary adaptation, or
#             (b) missing early-block adaptation for low-level textures/edges.
# D1 tests both hypotheses simultaneously by going to r=32 and adapting
