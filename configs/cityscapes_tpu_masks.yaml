# Cityscapes TPU training with CutS3D pseudo-mask supervision
# Usage: python scripts/train.py --config configs/cityscapes_tpu_masks.yaml
# Target: panoptic-tpu-mbps (v4-8, 4 chips)

_base_: "default.yaml"

architecture:
  num_classes: 19
  max_instances: 5  # CutS3D extracts ≤3 masks per image, buffer to 5

data:
  dataset: "cityscapes"
  data_dir: "gs://mbps-panoptic/datasets/cityscapes"
  depth_dir: "gs://mbps-panoptic/datasets/cityscapes/depth_zoedepth"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords_with_masks/train"
  pseudo_mask_dir: "gs://mbps-panoptic/datasets/cityscapes/pseudo_masks_512"
  num_classes: 19
  num_stuff_classes: 11
  num_thing_classes: 8
  image_size: [512, 1024]
  crop_size: [512, 512]
  batch_size: 8  # per TPU core, global = 8 * 4 = 32

  stuff_classes: ["road", "sidewalk", "building", "wall", "fence",
                   "pole", "traffic_light", "traffic_sign", "vegetation",
                   "terrain", "sky"]
  thing_classes: ["person", "rider", "car", "truck", "bus",
                   "train", "motorcycle", "bicycle"]

training:
  total_epochs: 60
  phase_a_end: 20
  phase_b_end: 40
  self_training_rounds: 3
  learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0
  warmup_epochs: 5

gcs:
  bucket: "mbps-panoptic"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords_with_masks/train"
  pseudo_mask_dir: "gs://mbps-panoptic/datasets/cityscapes/pseudo_masks_512"
  checkpoint_dir: "gs://mbps-panoptic/checkpoints/mbps_tpu"
  results_dir: "gs://mbps-panoptic/results"
  weights_dir: "gs://mbps-panoptic/weights"

logging:
  use_wandb: false
  wandb_group: "cityscapes_pseudo_masks"
  log_every_n_steps: 50

evaluation:
  ignore_label: 255
  pred_all_class: true
