# Level-2 Ablation B: SSRCTS — Stage-Specific Rare-Class Sampling
# Enforces >=2 rare-class RoIs per image in each cascade stage by relaxing
# IoU threshold to 0.35 for rare classes and promoting background proposals.

_base_: anydesk_baseline.yaml

MODEL:
  ROI_BOX_HEAD:
    SSRCTS_ENABLED: True
    SSRCTS_RARE_IDS: [13, 14, 15]  # caravan, trailer, polegroup (adjust to actual IDs)

TRAINING:
  ACCUMULATE_GRAD_BATCHES: 2
  STEPS: 8000
  BATCH_SIZE: 8
  VAL_EVERY_N_STEPS: 500

SYSTEM:
  NUM_GPUS: 1
  NUM_WORKERS: 4
  SYSTEM.RUN_NAME: "L2B_SSRC_TS"

SYSTEM.LOG_PATH: "./output/L2B_SSRC_TS"
