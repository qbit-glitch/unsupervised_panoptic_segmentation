# AnyDesk baseline — DINOv3 ViT-B/16 on DCFA+DepthPro+SIMCF-ABC pseudo-labels
# Direct port of working santosh config, adjusted for RTX Pro 6000 (1 GPU, 48GB)
_BASE_: ../cups_cityscapes.yaml

DATA:
  ROOT: "/home/cvpr_ug_5/umesh/datasets/cityscapes"
  ROOT_VAL: "/home/cvpr_ug_5/umesh/datasets/cityscapes"
  ROOT_PSEUDO: "/home/cvpr_ug_5/umesh/datasets/cityscapes/cups_pseudo_labels_dcfa_simcf_abc"
  THING_STUFF_THRESHOLD: 0.05

MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
  ROI_BOX_HEAD:
    USE_SEESAW_LOSS: True
    SEESAW_P: 0.8
    SEESAW_Q: 2.0
  TTA_SCALES:
    - 0.75
    - 1.0
    - 1.25

AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]

TRAINING:
  STEPS: 8000
  BATCH_SIZE: 8
  ACCUMULATE_GRAD_BATCHES: 2
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1

SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5

VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False

SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 1
  NUM_WORKERS: 4
  RUN_NAME: "anydesk_baseline"
  LOG_PATH: "./output/anydesk_baseline"
