# Level-2 Ablation E: Combined Stack
# BACC-TS + SSRCTS + EQL v2 + RFCL all together.

_base_: anydesk_baseline.yaml

MODEL:
  SEM_SEG_HEAD:
    CLASS_WEIGHT: [0.542, 0.906, 0.549, 1.006, 1.057, 0.837, 1.213, 0.721, 0.847, 0.953, 0.992, 1.119, 0.875, 0.509, 0.754, 1.277, 2.038, 1.185, 1.62]
    BOUNDARY_WEIGHT: 1.0
    BOUNDARY_DILATE_PX: 3
    BOUNDARY_CE_MULT: 3.0
    STUFF_KD_WEIGHT: 0.5
    KD_TEMPERATURE: 2.0
  ROI_BOX_HEAD:
    SSRCTS_ENABLED: True
    SSRCTS_RARE_IDS: [13, 14, 15]
    USE_SEESAW_LOSS: False
    USE_EQLV2: True
    EQLV2_GAMMA: 12.0

RFCL:
  ENABLED: True
  RARE_CLASSES: [3, 6, 12, 16, 17]
  RARE_FRACTION_START: 0.8
  RARE_FRACTION_END: 0.0

TRAINING:
  STEPS: 8000
  BATCH_SIZE: 4
  VAL_EVERY_N_STEPS: 500

SYSTEM:
  NUM_GPUS: 1
  NUM_WORKERS: 4
  RUN_NAME: "L2E_Combined"

OUTPUT_DIR: "./output/L2E_Combined"
