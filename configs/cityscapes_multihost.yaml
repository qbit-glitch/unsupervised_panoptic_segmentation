# Cityscapes multi-host config (4 VMs x 4 chips = 16 devices)
# LR scaled 4x (1e-4 -> 4e-4) for 4x global batch size (32 -> 128)
# Usage: bash scripts/launch_multihost.sh cityscapes_multihost.yaml

_base_: "default.yaml"

architecture:
  num_classes: 19

data:
  dataset: "cityscapes"
  data_dir: "gs://mbps-panoptic/datasets/cityscapes"
  depth_dir: "gs://mbps-panoptic/datasets/cityscapes/depth_zoedepth"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords/train"
  num_classes: 19
  num_stuff_classes: 11
  num_thing_classes: 8
  image_size: [512, 1024]
  crop_size: [512, 512]
  num_train_images: 2975

  stuff_classes: ["road", "sidewalk", "building", "wall", "fence",
                   "pole", "traffic_light", "traffic_sign", "vegetation",
                   "terrain", "sky"]
  thing_classes: ["person", "rider", "car", "truck", "bus",
                   "train", "motorcycle", "bicycle"]

training:
  learning_rate: 8.0e-4  # 8x linear scaling for 32-device global batch (v5e-32 pod)

gcs:
  bucket: "mbps-panoptic"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords/train"
  checkpoint_dir: "gs://mbps-panoptic/checkpoints"
  results_dir: "gs://mbps-panoptic/results"
  weights_dir: "gs://mbps-panoptic/weights"

logging:
  use_wandb: false  # Disable until W&B is configured on the pod
  wandb_group: "cityscapes_multihost"

evaluation:
  ignore_label: 255
  pred_all_class: true
