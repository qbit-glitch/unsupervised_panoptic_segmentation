# Cityscapes 5% subset — for quick prototyping
# ~29 train images from proxy dataset (586 * 5%)

_base_: "default.yaml"

architecture:
  num_classes: 19
  max_instances: 5  # Reduced for faster extraction + compilation

data:
  dataset: "cityscapes"
  data_dir: "/home/qbit-glitch/mbps_panoptic_segmentation/data/cityscapes_proxy"
  depth_dir: "/home/qbit-glitch/mbps_panoptic_segmentation/data/cityscapes_proxy/depth_zoedepth"
  num_classes: 19
  num_stuff_classes: 11
  num_thing_classes: 8
  image_size: [128, 256]
  crop_size: [128, 128]
  batch_size: 2
  subset_fraction: 0.05

  stuff_classes: ["road", "sidewalk", "building", "wall", "fence",
                   "pole", "traffic_light", "traffic_sign", "vegetation",
                   "terrain", "sky"]
  thing_classes: ["person", "rider", "car", "truck", "bus",
                   "train", "motorcycle", "bicycle"]

training:
  total_epochs: 50
  phase_a_end: 15
  phase_b_end: 35
  learning_rate: 1.0e-4
  weight_decay: 0.01
  gradient_clip: 1.0

evaluation:
  ignore_label: 255
  pred_all_class: true
