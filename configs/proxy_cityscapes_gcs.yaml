# Proxy Cityscapes config for TPU smoke testing (GCS data paths)
# Small resolution, few epochs -- validates GCS + TPU pipeline end-to-end
# Usage: python scripts/train.py --config configs/proxy_cityscapes_gcs.yaml

_base_: "default.yaml"

architecture:
  num_classes: 19

data:
  dataset: "cityscapes"
  data_dir: "gs://mbps-panoptic/datasets/cityscapes"
  depth_dir: "gs://mbps-panoptic/datasets/cityscapes/depth_zoedepth"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords/train"
  num_classes: 19
  num_stuff_classes: 11
  num_thing_classes: 8
  image_size: [256, 512]      # Half resolution for speed
  crop_size: [256, 256]

training:
  total_epochs: 6             # 10% of full (60)
  phase_a_end: 2              # Phase A: epochs 1-2
  phase_b_end: 4              # Phase B: epochs 3-4
  # Phase C: epochs 5-6
  self_training_rounds: 1     # 1 round instead of 3
  self_training_epochs_per_round: 1
  batch_size: 2               # Small batch for proxy
  learning_rate: 4.0e-4       # Higher LR for fewer epochs

gcs:
  bucket: "mbps-panoptic"
  tfrecord_dir: "gs://mbps-panoptic/datasets/cityscapes/tfrecords/train"
  checkpoint_dir: "gs://mbps-panoptic/checkpoints"
  results_dir: "gs://mbps-panoptic/results"
  weights_dir: "gs://mbps-panoptic/weights"

checkpointing:
  save_every_n_epochs: 2
  checkpoint_dir: "checkpoints/proxy_cityscapes/"

logging:
  log_every_n_steps: 5
  eval_every_n_epochs: 2
  use_wandb: false
