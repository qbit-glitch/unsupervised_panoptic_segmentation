# Proxy COCO-Stuff-27 config for TPU smoke testing (GCS data paths)
# Small resolution, few epochs -- validates GCS + TPU pipeline end-to-end
# Usage: python scripts/train.py --config configs/proxy_coco_gcs.yaml

_base_: "default.yaml"

architecture:
  num_classes: 27

data:
  dataset: "coco_stuff27"
  data_dir: "gs://mbps-panoptic/datasets/coco"
  depth_dir: "gs://mbps-panoptic/datasets/coco/depth_zoedepth"
  tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/train"
  num_classes: 27
  num_stuff_classes: 15
  num_thing_classes: 12
  image_size: [256, 256]
  crop_size: [256, 256]

training:
  total_epochs: 6
  phase_a_end: 2
  phase_b_end: 4
  self_training_rounds: 1
  self_training_epochs_per_round: 1
  batch_size: 2
  learning_rate: 4.0e-4

gcs:
  bucket: "mbps-panoptic"
  tfrecord_dir: "gs://mbps-panoptic/datasets/coco/tfrecords/train"
  checkpoint_dir: "gs://mbps-panoptic/checkpoints"
  results_dir: "gs://mbps-panoptic/results"
  weights_dir: "gs://mbps-panoptic/weights"

checkpointing:
  save_every_n_epochs: 2
  checkpoint_dir: "checkpoints/proxy_coco/"

logging:
  log_every_n_steps: 5
  eval_every_n_epochs: 2
  use_wandb: false
