# Oracle GT Config: Train Cascade Mask R-CNN with DINOv3 ViT-B/16 on GT labels
# Purpose: Determine upper bound PQ for this architecture
# Usage: python train.py --experiment_config_file configs/oracle_gt_cityscapes_dinov3_vitb.yaml

DATA:
  CROP_RESOLUTION: (640, 1280)
  SCALE: 0.625
  DATASET: "cityscapes"
  IGNORE_UNKNOWN_THING_REGIONS: False
  ROOT: "/home/santosh/datasets/cityscapes/"
  ROOT_VAL: "/home/santosh/datasets/cityscapes/"
  # NOTE: This points to GT labels. You must ensure PseudoLabelDataset can load GT.
  # If not, convert GT panoptic labels to pseudo-label format first.
  ROOT_PSEUDO: "/home/santosh/datasets/cityscapes/gtFine/train/"
  NUM_CLASSES: 27
MODEL:
  BACKBONE_TYPE: "dinov3_vitb"
  DINOV2_FREEZE: True
  USE_DINO: False
AUGMENTATION:
  NUM_STEPS_STARTUP: 500
  COPY_PASTE: True
  MAX_NUM_PASTED_OBJECTS: 3
  RESOLUTIONS:
    - [384, 768]
    - [416, 832]
    - [448, 896]
    - [480, 960]
    - [512, 1024]
SYSTEM:
  ACCELERATOR: "gpu"
  NUM_GPUS: 2
  NUM_NODES: 1
  NUM_WORKERS: 4
  LOG_PATH: "/home/santosh/cups/experiments"
  RUN_NAME: "oracle_gt_dinov3_vitb"
  SEED: 1996
TRAINING:
  STEPS: 8000
  BATCH_SIZE: 1
  ACCUMULATE_GRAD_BATCHES: 8
  PRECISION: "32-true"
  OPTIMIZER: "adamw"
  ADAMW:
    LEARNING_RATE: 0.0001
    WEIGHT_DECAY: 0.00001
  VAL_EVERY_N_STEPS: 500
  LOG_EVERT_N_STEPS: 50
  DROP_LOSS: True
  DROP_LOSS_IOU_THRESHOLD: 0.4
  LOG_MEDIA_N_STEPS: 1000
  GRADIENT_CLIP_ALGORITHM: "norm"
  GRADIENT_CLIP_VAL: 0.1
SELF_TRAINING:
  ROUND_STEPS: 500
  ROUNDS: 3
  CONFIDENCE_STEP: 0.05
  USE_DROP_LOSS: False
  SEMANTIC_SEGMENTATION_THRESHOLD: 0.5
VALIDATION:
  CACHE_DEVICE: "cpu"
  USE_TTA: False
